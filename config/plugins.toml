  "llm.openrouter",
  "llm.zai",
  "llm.ollama",
  "service.prompt_manager",
  "llm.deepseek",
  "llm.llama_cli",
  "management.unified",
  "service.management_index",
  "service.meeting_topic_suggester",
]

[pipeline]
optional_stage_retries = 1

[disabled]
ids = []

